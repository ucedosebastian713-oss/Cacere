<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Football IA PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
        :root {
            --bg: #1A1D23; --card: #252A34; --primary: #FF2E63; --accent: #08D9D6;
            --text: #EEEEEE; --muted: #8D99AE;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 60px; }
        nav {
            display: flex; justify-content: space-around; background: #000;
            padding: 18px 0; position: sticky; top: 0; z-index: 1000;
        }
        nav button {
            background: none; border: none; font-size: 11px; font-weight: 800;
            color: var(--muted); cursor: pointer; text-transform: uppercase;
        }
        nav button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .container { padding: 15px; max-width: 450px; margin: auto; }
        .card {
            background: var(--card); border-radius: 20px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 20px;
        }
        select, textarea {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #3F4451;
            background: #1A1D23; color: white; margin-bottom: 12px; font-size: 14px; outline: none;
        }
        .btn {
            background: var(--primary); color: white; border: none; width: 100%;
            padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; margin-top: 10px;
        }
        .btn-reset { background: #3F4451; color: #FF2E63; font-size: 10px; margin-top: 40px; border: none; padding: 10px; border-radius: 10px; width: 100%; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .chart-box { position: relative; text-align: center; }
        .circle-svg { width: 80px; height: 80px; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: #3F4451; stroke-width: 7; }
        .circle-val { fill: none; stroke-width: 7; stroke-linecap: round; stroke-dasharray: 226; stroke-dashoffset: 226; transition: 1s ease-in-out; }
        .pct-num { position: absolute; width: 80px; line-height: 80px; top: 0; font-weight: 800; font-size: 14px; }
        .label { font-size: 9px; font-weight: 800; color: var(--muted); display: block; margin-top: 4px; text-transform: uppercase; }
        .hidden { display: none !important; }
        .score-row { padding: 10px; background: #1A1D23; border-radius: 8px; margin-top: 5px; font-weight: 800; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<nav>
    <button id="m-main" class="active" onclick="tab('main')">Predictor</button>
    <button id="m-data" onclick="tab('data')">Ligas</button>
    <button id="m-cups" onclick="tab('cups')">Historial</button>
</nav>

<div class="container">
    <div id="v-main">
        <div class="card">
            <h2 style="font-size:12px; color:var(--accent); margin-bottom:15px;">ANALIZADOR DE PARTIDOS</h2>
            <select id="main-sel" onchange="upTeams()"></select>
            <div id="ui-match" class="hidden">
                <select id="sel-local"></select>
                <select id="sel-away"></select>
                <button class="btn" onclick="predict()">CALCULAR PREDICCION</button>
            </div>
        </div>
        <div id="res-ui" class="hidden">
            <div class="card" style="text-align:center;">
                <h1 id="match-title" style="font-size:18px; margin-bottom:20px;"></h1>
                <div class="stats-grid" id="grid-1x2"></div>
                <div class="stats-grid" id="grid-goals"></div>
                <div id="list-top" style="text-align:left; margin-top:15px;"></div>
                <button class="btn" style="background:var(--accent); color:#000;" onclick="toCups()">GUARDAR RESULTADO</button>
            </div>
        </div>
    </div>

    <div id="v-data" class="hidden">
        <div id="data-list"></div>
        <button class="btn-reset" onclick="clearDb()">LIMPIAR TODO (RESET)</button>
    </div>

    <div id="v-cups" class="hidden">
        <div id="cups-list"></div>
        <button class="btn-reset" onclick="clearCups()">VACIAR HISTORIAL</button>
    </div>
</div>

<script>
    const LIGAS = [
        {id:'py1', n:'Paraguay Primera'},
        {id:'en1', n:'Premier League'},
        {id:'de1', n:'Bundesliga'}
    ];

    let db = JSON.parse(localStorage.getItem('fpro_db')) || {};
    let cp = JSON.parse(localStorage.getItem('fpro_cp')) || [];

    function tab(v) {
        ['v-main','v-data','v-cups'].forEach(i => document.getElementById(i).classList.add('hidden'));
        document.getElementById('v-'+v).classList.remove('hidden');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('m-'+v).classList.add('active');
        if(v==='main') loadLeagues();
        if(v==='data') renderData();
        if(v==='cups') renderCups();
    }

    function loadLeagues() {
        const s = document.getElementById('main-sel');
        const active = Object.keys(db);
        let h = '<option value="">Selecciona Liga...</option>';
        LIGAS.forEach(l => { if(active.includes(l.id)) h += `<option value="${l.id}">${l.n}</option>`; });
        s.innerHTML = h;
    }

    function renderData() {
        document.getElementById('data-list').innerHTML = LIGAS.map(l => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:800;">${l.n}</span>
                    <button class="btn" style="width:auto; padding:8px 15px; margin:0;" onclick="document.getElementById('box-${l.id}').classList.toggle('hidden')">EDITAR</button>
                </div>
                <div id="box-${l.id}" class="hidden" style="margin-top:15px;">
                    <textarea id="rawL-${l.id}" rows="4" placeholder="Tabla Local..."></textarea>
                    <textarea id="rawV-${l.id}" rows="4" placeholder="Tabla Visitante..."></textarea>
                    <button class="btn" onclick="saveDb('${l.id}')">GUARDAR LIGA</button>
                </div>
            </div>
        `).join('');
    }

    function saveDb(id) {
        const rL = document.getElementById('rawL-'+id).value;
        const rV = document.getElementById('rawV-'+id).value;
        if(!rL || !rV) return;
        const parse = (t) => {
            const lines = t.trim().split('\n');
            let tms = [], gfS=0, gcS=0, pjS=0;
            lines.forEach(l => {
                const c = l.split(/\t|\s{2,}/);
                if(c.length >= 8) {
                    const pj=parseInt(c[2]), gf=parseInt(c[6]), gc=parseInt(c[7]);
                    if(pj>0){ tms.push({n:c[1].trim(), pj, gf, gc, a:gf/pj, d:gc/pj}); gfS+=gf; gcS+=gc; pjS+=pj; }
                }
            });
            const avgA = gfS/pjS, avgD = gcS/pjS;
            tms.forEach(t => { t.fA = t.a/avgA; t.fD = t.d/avgD; });
            return {tms, avgA, avgD};
        };
        db[id] = { L: parse(rL), V: parse(rV) };
        localStorage.setItem('fpro_db', JSON.stringify(db));
        alert("Guardado OK"); tab('main');
    }

    function upTeams() {
        const id = document.getElementById('main-sel').value;
        if(!id) return;
        document.getElementById('ui-match').classList.remove('hidden');
        document.getElementById('sel-local').innerHTML = db[id].L.tms.map(t=>`<option value="${t.n}">${t.n}</option>`).join('');
        document.getElementById('sel-away').innerHTML = db[id].V.tms.map(t=>`<option value="${t.n}">${t.n}</option>`).join('');
    }

    function predict() {
        const id = document.getElementById('main-sel').value;
        const nL = document.getElementById('sel-local').value;
        const nV = document.getElementById('sel-away').value;
        const liga = db[id], tL = liga.L.tms.find(t=>t.n===nL), tV = liga.V.tms.find(t=>t.n===nV);
        const expL = tL.fA * tV.fD * liga.L.avgA, expV = tV.fA * tL.fD * liga.V.avgA;
        const pois = (k, l) => (Math.exp(-l) * Math.pow(l, k)) / [1,1,2,6,24,120,720,5040][k];
        
        let pL=0, pE=0, pV=0, o15=0, o25=0, btts=0, sc=[];
        for(let i=0; i<7; i++){
            for(let j=0; j<7; j++){
                let p = pois(i, expL) * pois(j, expV);
                if(i>j) pL+=p; else if(i==j) pE+=p; else pV+=p;
                if(i+j>1.5) o15+=p; if(i+j>2.5) o25+=p;
                if(i>0 && j>0) btts+=p;
                sc.push({s:`${i}-${j}`, p:p*100});
            }
        }
        sc.sort((a,b)=>b.p-a.p);
        window.cur = {nL, nV, pL, pE, pV, o15, o25, btts, top:sc.slice(0,5)};
        document.getElementById('res-ui').classList.remove('hidden');
        document.getElementById('match-title').innerText = nL + " vs " + nV;

        const circ = (v, l) => {
            const col = v > 0.6 ? '#08D9D6' : v > 0.4 ? '#FFD369' : '#FF2E63';
            return `<div class="chart-box">
                <svg class="circle-svg"><circle class="circle-bg" cx="40" cy="40" r="36"/><circle class="circle-val" cx="40" cy="40" r="36" style="stroke-dashoffset:${226-(226*v)}; stroke:${col}"/></svg>
                <div class="pct-num">${Math.round(v*100)}%</div><span class="label">${l}</span>
            </div>`;
        };
        document.getElementById('grid-1x2').innerHTML = circ(pL,'LOCAL')+circ(pE,'EMPATE')+circ(pV,'VISITA');
        document.getElementById('grid-goals').innerHTML = circ(o15,'O 1.5')+circ(o25,'O 2.5')+circ(btts,'BTTS');
        document.getElementById('list-top').innerHTML = window.cur.top.map(s => `<div class="score-row"><span>${s.s}</span><span style="color:var(--accent)">${s.p.toFixed(1)}%</span></div>`).join('');
    }

    function toCups() {
        cp.push({m: window.cur.nL + " vs " + window.cur.nV, res: window.cur});
        localStorage.setItem('fpro_cp', JSON.stringify(cp));
        alert("Guardado");
    }

    function renderCups() {
        document.getElementById('cups-list').innerHTML = cp.map(c => `<div class="card">${c.m}<br><small style="color:var(--accent)">TOP: ${c.res.top[0].s}</small></div>`).join('');
    }

    function clearDb() { if(confirm("¿Borrar todo?")){ localStorage.clear(); location.reload(); } }
    function clearCups() { cp=[]; localStorage.setItem('fpro_cp','[]'); renderCups(); }
    tab('main');
</script>
</body>
</html>
